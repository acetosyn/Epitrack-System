<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}EPITRACK{% endblock %} - Epiconsult Clinic & Diagnostics</title>

  <!-- Global Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/departments.css') }}">
  {% block extra_css %}{% endblock %}
</head>

<body>
  <div id="app" class="app-shell">
    <!-- Header -->
    {% include 'partials/header.html' %}

    <!-- Sidebar -->
    {% include 'partials/sidebar.html' %}

    <!-- Main Section -->
    <main class="main-section">
      <!-- Breadcrumb -->
      <div class="breadcrumb-bar">
        {% block breadcrumb %}
        <span class="crumb">Dashboard</span>
        {% endblock %}
      </div>

      <!-- Dynamic Content -->
      <div class="page-content">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <!-- Global Modals -->
  {% include 'partials/modals.html' %}

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Floating Buttons -->
  <button id="scrollTopBtn" class="scroll-top" title="Scroll to Top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <button id="chatBubble" class="chat-bubble" title="Help & Support">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
  </button>

  <!-- Scripts -->
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
